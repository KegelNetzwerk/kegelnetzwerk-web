sonar.projectKey=KegelNetzwerk_kegelnetzwerk-web
sonar.organization=kegelnetzwerk

sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclude test files from duplication detection (test code naturally repeats patterns)
sonar.cpd.exclusions=src/__tests__/**

# Exclude non-unit-testable files from coverage: UI components, pages, layouts,
# infrastructure (prisma, email, push, auth), and untested API routes.
# Only pure-logic lib modules and the two tested API routes remain in scope.
sonar.coverage.exclusions=\
  src/components/**,\
  src/app/**/page.tsx,\
  src/app/**/layout.tsx,\
  src/app/**/not-found.tsx,\
  src/app/**/error.tsx,\
  src/app/**/*Client.tsx,\
  src/app/**/*Form.tsx,\
  src/app/**/*Wrapper.tsx,\
  src/app/**/*Overview.tsx,\
  src/app/**/*List.tsx,\
