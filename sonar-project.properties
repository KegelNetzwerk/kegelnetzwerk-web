sonar.projectKey=KegelNetzwerk_kegelnetzwerk-web
sonar.organization=kegelnetzwerk

sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclude test files from duplication detection (test code naturally repeats patterns)
sonar.cpd.exclusions=src/__tests__/**

# Coverage scope: only pure-logic lib modules with tests and the two tested API routes.
# Excluded: test files themselves, all TSX UI components/pages, untested API routes,
# infrastructure lib (prisma, auth, email, push), config files, scripts.
sonar.coverage.exclusions=src/__tests__/**,src/app/**/*.tsx,src/app/uploads/**,src/app/api/app/activity/**,src/app/api/app/clubs/**,src/app/api/app/delete-results/**,src/app/api/app/events/**,src/app/api/app/games/**,src/app/api/app/guests/**,src/app/api/app/members/**,src/app/api/app/push-token/**,src/app/api/app/upload-photo/**,src/app/api/app/upload-results/**,src/app/api/app/version/**,src/app/api/auth/logout/**,src/app/api/auth/password-reset/**,src/app/api/auth/register/**,src/app/api/club-comments/**,src/app/api/club/**,src/app/api/comments/**,src/app/api/events/**,src/app/api/games/**,src/app/api/gen/**,src/app/api/member-comments/**,src/app/api/members/**,src/app/api/news/**,src/app/api/profile/**,src/app/api/results/**,src/app/api/scoring/**,src/app/api/secret-santa/**,src/app/api/votes/**,src/lib/appAuth.ts,src/lib/auth.ts,src/lib/email.ts,src/lib/push.ts,src/lib/prisma.ts,src/lib/upload.ts,src/lib/turnstile.ts,src/lib/yearly-winners.ts,src/lib/kegelImage.ts,src/lib/kegelPins.ts,src/lib/utils.ts,src/lib/recurrence.ts,src/components/**,src/i18n/**,src/proxy.ts,scripts/**,prisma/**,jest.config.ts,next.config.ts,postcss.config.mjs,eslint.config.mjs,ecosystem.config.js
